<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="head">
            <h1>Seus Contatos</h1>
            <input type="text" name="navbar" id="navbar" placeholder="Pesquisar">
    </div>
    <div class="boxbody">
        
    </div>
    <dialog id="popup">
        <div class="window_cadastro">
            <label id="text" for="nome">Nome Completo:</label>
            <input type="text" id="nome" name="nome" placeholder="Digite o nome completo">
            <label id="text" for="tel">Telefone:</label>
            <input type="tel" id="tel" name="tel" placeholder="(XX) XXXXX-XXXX">
            <label id="text" for="email">Email aqui:</label>
            <input type="text" id="email" name="email" placeholder="email@exemplo.com">
            <br>
            <button type="submit" id="buttonsend">Cadastrar</button>
        </div>
    </dialog>
    <p id="tam"></p>
    <div class="crud_bar">
       <button id="new_contact">Novo Contato</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
